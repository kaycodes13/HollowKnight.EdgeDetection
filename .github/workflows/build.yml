name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      attestation-url: ${{ steps.attest.outputs.attestation-url }}
      allow-release: 'true'
      is-new-version: ${{ !fromJSON(steps.needs-release.outputs.exists || 'true') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MAPI
        uses: BadMagic100/setup-hk@v3
        with:
          apiPath: API
          dependencyFilePath: ./ModDependencies.txt

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
      
      - name: Install dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --verbosity normal

      - name: Get Version
        id: version
        run: |-
          VERSION=$(dotnet build EdgeDetection.csproj -getProperty:Version)
          echo Version is $VERSION
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare artifacts for release
        uses: actions/upload-artifact@v7
        with:
          name: Publish
          path: bin/Publish

      - name: Check if release needed
        id: needs-release
        uses: mukunku/tag-exists-action@v1.7.0
        if: github.event_name == 'push'
        with:
          tag: v${{ steps.version.outputs.version }}

      - name: Generate attestation
        id: attest
        if: github.event_name == 'push' && steps.needs-release.outputs.exists == 'false'
        uses: actions/attest@v4
        with:
          name: Publish
          subject-path: bin/Publish/EdgeDetection.zip

  # Publish to GitHub releases to keep release history on the repository (needed for this workflow to work properly
  # but is also nice for multiple other reasons such as auto-tagging *after* a build success)
  release:
    needs:
      - build
    runs-on: ubuntu-latest
    # only make a release if we manually request the build - other builds will be handled automatically with a push
    if: github.event_name == 'push' && needs.build.outputs.allow-release == 'true' && needs.build.outputs.is-new-version == 'true'

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          name: Publish
          path: artifacts/Publish
          skip-decompress: true

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          tag_name: v${{ needs.build.outputs.version }}
          body: |
            Build attested at ${{ needs.build.outputs.attestation-url }}
          files: |
            artifacts/Publish/EdgeDetection.zip
